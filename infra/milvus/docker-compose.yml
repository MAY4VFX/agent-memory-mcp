services:
  etcd:
    restart: unless-stopped
    image: quay.io/coreos/etcd:v3.5.26
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - dokploy-network

  milvus:
    restart: unless-stopped
    image: milvusdb/milvus:v2.5.26
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: "192.168.2.93:9000"
      MINIO_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID}"
      MINIO_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY}"
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: "amm-milvus"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - dokploy-network

volumes:
  etcd_data:
  milvus_data:

networks:
  dokploy-network:
    external: true
