x-langfuse-env: &langfuse-env
  DATABASE_URL: "${DATABASE_URL}"
  DIRECT_URL: "${DATABASE_URL}"
  NEXTAUTH_URL: "http://192.168.2.140:3500"
  NEXTAUTH_SECRET: "${LANGFUSE_SECRET}"
  SALT: "${LANGFUSE_SALT}"
  ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
  HOSTNAME: "0.0.0.0"
  TELEMETRY_ENABLED: "false"
  # Clickhouse
  CLICKHOUSE_MIGRATION_URL: "clickhouse://clickhouse:9000"
  CLICKHOUSE_URL: "http://clickhouse:8123"
  CLICKHOUSE_USER: "clickhouse"
  CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-clickhouse}"
  CLICKHOUSE_CLUSTER_ENABLED: "false"
  # Redis
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_AUTH: "${REDIS_AUTH:-langfuse-redis}"
  # S3 (external MinIO)
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: "langfuse"
  LANGFUSE_S3_EVENT_UPLOAD_REGION: "auto"
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID}"
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY}"
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: "http://192.168.2.93:9000"
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_EVENT_UPLOAD_PREFIX: "events/"
  LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: "langfuse"
  LANGFUSE_S3_MEDIA_UPLOAD_REGION: "auto"
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID}"
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY}"
  LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: "http://192.168.2.93:9000"
  LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: "media/"
  LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"

services:
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: always
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *langfuse-env
    networks:
      - dokploy-network

  langfuse:
    image: langfuse/langfuse:3
    restart: always
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3500:3000"
    environment:
      <<: *langfuse-env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/public/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - dokploy-network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: always
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-clickhouse}"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - dokploy-network

  redis:
    image: redis:7
    restart: always
    command: >
      --requirepass ${REDIS_AUTH:-langfuse-redis}
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_AUTH:-langfuse-redis}", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - dokploy-network

volumes:
  clickhouse_data:
  clickhouse_logs:

networks:
  dokploy-network:
    external: true
