services:
  falkordb:
    restart: unless-stopped
    image: falkordb/falkordb:v4.16.3
    environment:
      - REDIS_ARGS=--requirepass ${FALKORDB_PASSWORD}
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${FALKORDB_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

volumes:
  falkordb_data:

networks:
  dokploy-network:
    external: true
